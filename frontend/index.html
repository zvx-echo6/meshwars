<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>MeshWars</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/coverage.css" />
</head>
<body>

  <div id="map"></div>

  <div id="loading-overlay">
    <div class="loading-inner">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading map…</div>
    </div>
  </div>

  <div id="mt-winner-banner" class="mt-winner-banner"></div>

  <div id="mt-history-modal" class="mt-modal">
    <div class="mt-modal-inner">
      <div class="mt-modal-header">
        <span>Past Seasons</span>
        <button class="mt-modal-close" onclick="window.closeHistoryModal()">×</button>
      </div>
      <div id="mt-history-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"></script>

  <script src="/static/code.js" type="module"></script>
</body>
</html>
